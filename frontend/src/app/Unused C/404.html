<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Shop Order Form</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-inline .form-control {
      width: 100%;
    }
  </style>
</head>

<!-- Fruit Shop Order Form- 4 -->
<body>
  <div class="container mt-5">
    <h2>Fruit Shop Order Form</h2>
    <form id="orderForm">
		<div class="form-group">
			<label for="name">Name</label>
			<input type="text" class="form-control" id="name" placeholder="Enter your name" required>
		</div>
		<div class="form-group">
			<label for="contact">Contact Number</label>
			<input type="text" class="form-control" id="contact" placeholder="Enter your contact number" required>
		</div>
		<div class="form-group">
			<label for="address">Address</label>
			<textarea class="form-control" id="address" rows="3" placeholder="Enter your address" required></textarea>
		</div>
      <div id="fruitItems">
        <div class="form-row mb-2">
          <div class="col">
            <label>Fruit Item</label>
            <input type="text" class="form-control" name="fruitItem[]" placeholder="Enter fruit name" required>
          </div>
          <div class="col">
            <label>Quantity</label>
            <input type="number" class="form-control" name="quantity[]" min="1" required>
          </div>
          <div class="col">
            <label>Unit Price ($)</label>
            <input type="number" class="form-control" name="unitPrice[]" step="0.01" min="0" required>
          </div>
          <div class="col">
            <label>Total Price ($)</label>
            <input type="text" class="form-control totalPrice" name="totalPrice[]" readonly>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-secondary mb-2" onclick="addFruitItem()">Add Another Fruit</button>
      <div class="form-row mb-2">
        <div class="col text-right">
          <h4>Total Amount: $<span id="totalAmount">0.00</span></h4>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Submit Order</button>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script>
    function addFruitItem() {
      const fruitItemHtml = `
        <div class="form-row mb-2">
          <div class="col">
            <input type="text" class="form-control" name="fruitItem[]" placeholder="Enter fruit name" required>
          </div>
          <div class="col">
            <input type="number" class="form-control" name="quantity[]" min="1" required>
          </div>
          <div class="col">
            <input type="number" class="form-control" name="unitPrice[]" step="0.01" min="0" required>
          </div>
          <div class="col">
            <input type="text" class="form-control totalPrice" name="totalPrice[]" readonly>
          </div>
        </div>`;
      $('#fruitItems').append(fruitItemHtml);
    }

    function calculateTotals() {
      let totalAmount = 0;
      $('#orderForm .form-row').each(function() {
        const quantity = parseFloat($(this).find('input[name="quantity[]"]').val()) || 0;
        const unitPrice = parseFloat($(this).find('input[name="unitPrice[]"]').val()) || 0;
        const totalPrice = quantity * unitPrice;
        $(this).find('.totalPrice').val(totalPrice.toFixed(2));
        totalAmount += totalPrice;
      });
      $('#totalAmount').text(totalAmount.toFixed(2));
    }

    $(document).on('input', 'input[name="quantity[]"], input[name="unitPrice[]"]', calculateTotals);

    $('#orderForm').on('submit', function(event) {
      event.preventDefault();
      alert('Order submitted! Total Amount: $' + $('#totalAmount').text());
    });
  </script>
</body>
